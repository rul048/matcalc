# Regenerate API documentation and tutorial markdown on each release and
# commit the result back to main so that GitHub Pages picks up the change.
name: Update Docs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      task:
        type: choice
        options: [update-docs]
        default: update-docs
        description: Manually regenerate documentation.

permissions:
  contents: write

# Allow only one docs build at a time so concurrent releases don't race on
# pushes to main.
concurrency:
  group: "update-docs"
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'materialsvirtuallab/matcalc'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Check out main so the regenerated docs are committed there even
          # when the workflow is triggered by a release tag.
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install matcalc with docs dependencies
        run: |
          uv sync --group dev
          uv pip install -e .

      - name: Generate documentation
        run: uv run invoke make-docs

      - name: Commit and push updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi
          VERSION="${{ github.event.release.tag_name }}"
          if [ -z "$VERSION" ]; then
            VERSION="manual run"
          fi
          git commit -m "Update documentation for ${VERSION}"
          git push origin main
